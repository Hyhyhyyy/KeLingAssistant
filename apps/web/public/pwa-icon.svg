<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A87C"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
    <linearGradient id="planet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#88B04B"/>
      <stop offset="100%" style="stop-color:#6B8E23"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 星球 -->
  <circle cx="256" cy="240" r="140" fill="url(#planet)"/>

  <!-- 星球纹理 -->
  <ellipse cx="256" cy="200" rx="100" ry="20" fill="#7CB342" opacity="0.5"/>
  <ellipse cx="256" cy="260" rx="80" ry="15" fill="#558B2F" opacity="0.4"/>

  <!-- 叶子 -->
  <path d="M320 180 Q380 120 360 200 Q340 180 320 180" fill="#4CAF50"/>
  <path d="M200 180 Q140 120 160 200 Q180 180 200 180" fill="#4CAF50"/>

  <!-- AI 光环 -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="#FFD54F" stroke-width="3" stroke-dasharray="20 10" opacity="0.6"/>

  <!-- 底部文字 -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFF">课灵</text>
</svg>